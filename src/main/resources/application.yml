spring:
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: jdbc:mysql://localhost:3306/roomlog?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 5949
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: roomlog-secret-key-must-be-at-least-32-characters-long
  expiration: 86400000
  refresh-expiration: 1209600000

cloud:
  r2:
    account-id: ${R2_ACCOUNT_ID}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    bucket: ${R2_BUCKET}
    cdn-url: ${R2_CDN_URL}